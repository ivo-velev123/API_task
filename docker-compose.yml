services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5001:5001"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000
    volumes:
      - ./frontend:/app
    restart: unless-stopped